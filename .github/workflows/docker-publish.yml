name: Publish Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/caddy-mfa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to docker hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract caddy version
        id: version
        run: |
          CADDY_VERSION=$(grep -oP '(?<=FROM caddy:)\d+\.\d+\.\d+' caddy.dockerfile | head -1)
          echo "full=${CADDY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=${CADDY_VERSION%.*}" >> "$GITHUB_OUTPUT"
          echo "major=${CADDY_VERSION%%.*}" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists
        if: github.event_name != 'pull_request'
        id: check
        run: |
          TAG="${{ steps.version.outputs.full }}"
          if docker manifest inspect "${{ env.IMAGE_NAME }}:${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${TAG} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: caddy.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        if: github.event_name != 'pull_request' && steps.check.outputs.exists != 'true'
        env:
          TAG: v${{ steps.version.outputs.full }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Update docker hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
